name: Test branchMatchRegex Action

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24.14.0"

      - name: Test with single pattern
        uses: ./
        with:
          patterns: ".*"

      - name: Test with list
        uses: ./
        with:
          patterns: |
            - feature/*
            - fix/*
            - hotfix/*
            - docs/*
            - test/*
            - refactor/*
            - style/*
            - ci/*
            - perf/*
            - i18n/*
            - security/*
            - release/*
            - chore/*
            - test/*
            - renovate/*
            - dependabot/*

      - name: Test with inline list
        uses: ./
        with:
          patterns: "['feature/*', 'fix/*', 'hotfix/*', 'docs/*', 'test/*',
            'refactor/*', 'style/*', 'ci/*', 'perf/*', 'i18n/*', 'security/*',
            'release/*', 'chore/*', 'test/*', 'renovate/*, dependabot/*']"

      - name: Test with file
        uses: ./
        with:
          path: .github/branches.yml

      - name: Test with file
        uses: ./
        with:
          useDefaultPatterns: true

      - name: Test with file and branch name
        uses: ./
        with:
          useDefaultPatterns: true
          branch: "feature/test"

      - name: Test with URL
        uses: ./
        with:
          path: "https://raw.githubusercontent.com/IamPekka058/branchMatchRegex/main/assets/default-patterns.yml"
